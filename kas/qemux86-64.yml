# Kas config
# ==========

header:
  version: 21

# Target hardware specification
machine: qemux86-64
distro: poky
target:
  - core-image-minimal

# Layers and Repository orchestration
repos:
  # Base OpenEmbedded metadata layer
  openembedded-core:
    url: "https://git.openembedded.org/openembedded-core"
    branch: "wrynose"
    layers:
      meta:

  # Standalone BitBake execution engine
  bitbake:
    url: "https://git.openembedded.org/bitbake"
    branch: "2.18"
    layers: {}

  # Yocto configurations and BSP reference layers
  meta-yocto:
    url: "https://git.yoctoproject.org/meta-yocto"
    branch: "wrynose"
    layers:
      meta-yocto-bsp:
      meta-poky:

  # Local custom layers
  # The path is relative to where you run the 'kas' command (project root)
  # meta-dummy:
  #   path: meta-dummy

  meta-dev-custom:
    path: meta-dev-custom

# Base Configuration & Fragment integration
local_conf_header:
  wrynose-base: |
    CONF_VERSION = "2"
    PACKAGE_CLASSES = "package_deb"

  root-login-with-empty-password: |
    EXTRA_IMAGE_FEATURES += " empty-root-password \
                              allow-empty-password \
                              allow-root-login"
    #INHERIT += "extrausers"
    #EXTRA_USERS_PARAMS = "usermod -p '' root;"

  sstate-mirror-cdn: |
    SSTATE_MIRRORS = "file://.* http://cdn.yoctoproject.org/sstate/PATH;downloadfilename=PATH"
